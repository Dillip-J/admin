<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vision Admin - Secure Login</title>
    <link rel="stylesheet" href="css/admin-auth.css"> 
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body class="admin-auth-bg">

    <div class="admin-auth-wrapper">
        <div class="admin-auth-card">
            
            <div class="admin-auth-header">
                <div class="logo-circle bg-dark mx-auto mb-3"><i class="fa-solid fa-shield-halved"></i></div>
                <h2>Vision Admin</h2>
                <p>Secure System Access</p>
            </div>

            <form id="admin-login-form">
                
                <div class="alert-box alert-error mb-3 hidden" id="login-error">
                    <i class="fa-solid fa-circle-exclamation"></i>
                    <div id="login-error-text">Invalid admin credentials. Please try again.</div>
                </div>

                <div class="input-group mb-3">
                    <label>Admin Email</label>
                    <div class="input-with-icon">
                        <i class="fa-regular fa-envelope"></i>
                        <input type="email" id="admin-email" placeholder="admin@vision.com" required>
                    </div>
                </div>

                <div class="input-group mb-4">
                    <label>Master Password</label>
                    <div class="input-with-icon">
                        <i class="fa-solid fa-lock"></i>
                        <input type="password" id="admin-password" placeholder="••••••••" required>
                    </div>
                </div>

                <button type="submit" class="btn-admin-primary w-100">
                    <i class="fa-solid fa-right-to-bracket"></i> Authenticate
                </button>
            </form>

            <div class="admin-auth-footer">
                <a href="https://dillip-j.github.io/Vision-24-7"><i class="fa-solid fa-arrow-left"></i> Return to Main Website</a>
            </div>

        </div>
    </div>
    
    <script src="js/config.js"></script>         
    <script src="js/admin-guard.js"></script>    
    <script src="js/admin-login.js"></script>    
</body>
</html>
